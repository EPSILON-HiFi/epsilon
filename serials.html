<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильмы | Epsilon</title>
    <link rel="icon" href="/epsilon-logo.png" type="image/png">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D8GCKSB3YW"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-D8GCKSB3YW');
    </script>
    
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #aa0000;
            --black: #000000;
            --deep-black: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Courier New', monospace;
            padding: 1.5rem;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--dark-red);
        }

        h1 {
            color: var(--primary-red);
            font-size: 2.5rem;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--primary-red);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .films-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .films-grid {
                grid-template-columns: 1fr;
            }
        }

        .film-item {
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .film-item.hidden {
            display: none !important;
        }

        .film-item:hover {
            border-color: var(--primary-red);
            box-shadow: 0 6px 15px rgba(255, 0, 0, 0.3);
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .film-info {
            padding: 1rem;
            text-align: center;
        }

        .film-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.3rem;
        }

        .film-year {
            font-size: 0.9rem;
            color: var(--dark-red);
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>Фильмы / Сериалы</h1>
        <a href="index" class="back-link">← Вернуться на главную</a>
    </header>

    <div class="films-grid" id="filmsGrid">
    </div>

    <script>
        const films = [
            ["ДЕТСКИЙ ЛАГЕРЬ НЕ ОТПУСКАЕТ НАС", "2025", "https://youtu.be/Qk68WPlTIxQ?si=yKh6eVZm8BrI1NYj"],
            ["КРОВАВАЯ НОЧЬ В ЛАГЕРЕ ДЯТЛОВА", "2025", "https://youtu.be/_sllhieLByo?si=QcEKh-whQKU69p2i"],
            ["ВЫЖИТЬ В ДЕТСКОМ ЛАГЕРЕ", "2025", "https://youtu.be/8zMLnxGjK5Q?si=oqLmJwuQfFepn1z_"],
            ["МАНЬЯК ДЕТСКОГО ЛАГЕРЯ", "2025", "https://youtu.be/wFwzbXRTwt0?si=kFMVl3x0cvd5d56J"],
            ["ЛАГЕРЬ ДЯТЛОВА", "2025", "https://youtu.be/WllaE1BuAz4?si=RIkmadLhJErss2rj"],
            ["ПРИЗРАК НЕВЕРА", "2025", "https://youtu.be/Oqw4tGHyTCA?si=m4bWlUbJq5iIWPZt"],
            ["ВОССТАНИЕ РОБОТОВ", "2025", "https://youtu.be/xBmNven0WiE?si=14GF564ttYIeHZdn"],
            ["ВТОРЖЕНИЕ ИНОПЛАНЕТЯН", "2025", "https://youtu.be/DqsTpfU-PkI?si=kODdzSDS4OcqRW7x"],
            ["НОВОГОДНИЙ МАНЬЯК", "2024", "https://youtu.be/EUizvxMh8p4?si=62qXcAmvluPiANK2"],
            ["ЗОНА ОТЧУЖДЕНИЯ - ДРУГОЕ ИЗМЕРЕНИЕ", "2024", "https://youtu.be/SR104FYAX7U?si=mUaQ_mPYLrzdpyzm"],
            ["ВРАГ СРЕДИ НАС", "2024", "https://youtu.be/t2hHDr2Fu74?si=67DblWtLa2Ki7hP_"],
            ["ГОРОДСКОЙ ВЕЛИКАН", "2024", "https://youtu.be/VRdlX0czEZw?si=J5h9Caz237t2Eua0"],
            ["ЯДЕРНАЯ ВОЙНА", "2023", "https://youtu.be/ZOHUmVtH6qE?si=Uvl1ci_lKVTL_VQ6"],
            ["МАНЬЯК ВЕРНУЛСЯ", "2023", "https://youtu.be/x7ycawx7kmI?si=4gYR09wJopf8sEPg"],
            ["СЕКРЕТНАЯ МИССИЯ", "2023", "https://youtu.be/VgT54_aNdsU?si=KkL-c5PibkSiwVLC"],
            ["ЗАБРОШЕННАЯ АВИАБАЗА - СВЕРХГЛУБОКАЯ", "2023", "https://youtu.be/NVw5TgfSgn8?si=D4BO2E94_hqpv_Qv"],
            ["МОРСКОЕ ЧУДИЩЕ", "2022", "https://youtu.be/pa-6cjCbavQ?si=quxeYp2T7RWvCLBu"],
            ["МОНСТРЫ ЗАКУЛИСЬЯ", "2022", "https://youtu.be/zEBkSHDnVHM?si=H3qXnFAPzeKv24Cm"],
            ["МОНСТР - БИТВА ЗА ЗЕМЛЮ", "2022", "https://youtu.be/KXTQgYaY5o4?si=YtEafPaUTnpWUH_s"],
            ["МОНСТР - ВОЙНА МИРОВ", "2022", "https://youtu.be/3ORS2qUc98k?si=uOjHJWu3RrTzy48-"],
            ["ПОЕЗД ПРИЗРАК", "2021", "https://youtu.be/iZDko4mRrCE?si=spdg0h6C_Mti6QwJ"],
            ["МОНСТР", "2021", "https://youtu.be/RFUHt9MU-Gg?si=XTZ9PE__xdam1SFn"]
        ];

        function getYouTubeEmbedUrl(url) {
            try {
                const u = new URL(url.trim());
                let id = '';

                if (u.hostname === 'youtu.be') {
                    id = u.pathname.substring(1).split(/[?#]/)[0];
                } else if (u.hostname === 'www.youtube.com' && u.pathname === '/watch') {
                    id = u.searchParams.get('v');
                }

                if (id && id.length > 0) {
                    return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&controls=1&autoplay=0`;
                }
            } catch (e) {
                console.error('Неверная YouTube-ссылка:', url);
            }
            return null;
        }

        const grid = document.getElementById('filmsGrid');

        films.forEach(([title, year, url]) => {
            const embedUrl = getYouTubeEmbedUrl(url);
            if (!embedUrl) {
                console.warn('Пропущена недопустимая ссылка:', url);
                return;
            }

            const item = document.createElement('div');
            item.className = 'film-item';
            item.innerHTML = `
                <div class="video-wrapper">
                    <iframe
                        src="${embedUrl}"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen
                        frameborder="0">
                    </iframe>
                </div>
                <div class="film-info">
                    <div class="film-title">${title}</div>
                    <div class="film-year">${year}</div>
                </div>
            `;
            grid.appendChild(item);
        });
    </script>
    <script>
(function() {
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
    });

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
            e.preventDefault();
            return false;
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
            e.preventDefault();
            return false;
        }
        if (e.key === 'F12') {
            e.preventDefault();
            return false;
        }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') {
            e.preventDefault();
            return false;
        }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') {
            e.preventDefault();
            return false;
        }
    });

    document.querySelectorAll('img').forEach(img => {
        img.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });
    });
})();
</script>

<style>
    body {
        -webkit-user-select: none; /* Safari */
        -moz-user-select: none;    /* Firefox */
        -ms-user-select: none;     /* IE10+/Edge */
        user-select: none;         /* Standard */
        -webkit-touch-callout: none; /* iOS Safari */
    }

    img {
        -webkit-user-drag: none;
        -khtml-user-drag: none;
        -moz-user-drag: none;
        -o-user-drag: none;
        user-drag: none;
    }
</style>

<style>
.qr-box {
    position: fixed;
    bottom: 20px;
    right: 30px;  /* Закрепляет справа */
    left: auto;   /* Сбрасывает левую сторону */
    cursor: pointer;
    z-index: 9998;
}
.qr-box img {
    width: 100px;
    height: 100px;
    border: 2px solid #aa0000;
    border-radius: 8px;
    transition: 0.3s;
}
.qr-box:hover img {
    border-color: #ff0000;
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
}
.qr-box .tooltip {
    position: absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    background: #0a0a0a;
    color: #ff0000;
    padding: 8px 12px;
    border: 1px solid #aa0000;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}
.qr-box:hover .tooltip {
    opacity: 1;
    visibility: visible;
}
@media (max-width: 480px) {
    .qr-box .tooltip { display: none; }
}
</style>

<div class="qr-box" onclick="window.open('https://t.me/palma_202', '_blank')">
    <div class="tooltip">СКАНИРУЙ МЕНЯ</div>
    <img src="http://qrcoder.ru/code/?https%3A%2F%2Ft.me%2Fpalma_202&6&0" alt="QR Code">
</div>

</body>
</html>
