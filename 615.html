<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Низкий уровень доступа!</title>
    <link rel="icon" href="/epsilon-logo.png" type="image/png">

    <style>
        :root {
            --primary-red: #ff0000;
            --deep-black: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
    
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(0, 255, 0, 0.02) 50%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 999;
            animation: scanline 8s linear infinite;
            opacity: 0.5;
            mix-blend-mode: multiply;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }

        .logo-container {
            margin-bottom: 1.8rem;
            animation: fadeIn 1s forwards;
            animation-delay: 0.1s;
        }

        .epsilon-logo {
            width: 160px;
            height: auto;
            filter: drop-shadow(0 0 12px var(--primary-red));
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            from { filter: drop-shadow(0 0 8px var(--primary-red)); }
            to { filter: drop-shadow(0 0 20px var(--primary-red)); }
        }

        .error-code {
            font-size: 10rem;
            font-weight: bold;
            color: var(--primary-red);
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
            letter-spacing: 4px;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeIn 1.2s forwards;
            animation-delay: 0.3s;
        }

        .error-message {
            font-size: 1.4rem;
            color: #ccc;
            max-width: 600px;
            line-height: 1.6;
            padding: 0 1.5rem;
            opacity: 0;
            animation: fadeIn 1.2s forwards;
            animation-delay: 0.7s;
        }

        .error-message span {
            color: var(--primary-red);
            font-weight: bold;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .firefly {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--primary-red);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 8px 1px var(--primary-red);
            animation: floatUp linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-100px) translateX(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="/epsilon-logo.png" alt="Epsilon" class="epsilon-logo">
    </div>

    <div class="error-code">615</div>
    <div class="error-message">Любопытной Варваре на базаре нос оторвали. А ты шо думал так просто сюда попадешь, нет доступа - гуляй! <span>(EPSILON)</span></div>

    <script>
        if (window.innerWidth > 768) {
            for (let i = 0; i < 12; i++) {
                const firefly = document.createElement('div');
                firefly.className = 'firefly';
                firefly.style.left = Math.random() * 100 + 'vw';
                firefly.style.animationDuration = (6 + Math.random() * 8) + 's';
                firefly.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(firefly);
            }
        }
    </script>
    
    <script>
    (function() {
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
                e.preventDefault();
                return false;
            }
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') {
                e.preventDefault();
                return false;
            }
        });

        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('dragstart', function(e) {
                e.preventDefault();
            });
        });
    })();
    </script>

    <style>
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        img {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }
    </style>
</body>
</html>
