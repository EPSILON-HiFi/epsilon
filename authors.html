<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторы | Epsilon</title>
    <link rel="icon" href="/epsilon-logo.png" type="image/png">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D8GCKSB3YW"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-D8GCKSB3YW');
    </script>

    <style>
        :root {
            --primary-red: #ff1a1a;
            --bright-red: #ff3333;
            --dark-red: #cc0000;
            --black: #0a0a0f;
            --deep-black: #050508;
            --glass-bg: rgba(20, 20, 30, 0.65);
            --glass-border: rgba(255, 30, 30, 0.35);
            --glass-highlight: rgba(255, 255, 255, 0.08);
            --glow-red: rgba(255, 50, 50, 0.45);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @font-face {
            font-family: 'Minecraft Rus';
            src: url('/fonts/minecrfat.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
    
        body {
            background: 
                radial-gradient(ellipse at top, rgba(120, 0, 0, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at bottom, rgba(80, 0, 0, 0.2) 0%, transparent 60%),
                linear-gradient(180deg, var(--deep-black) 0%, var(--black) 100%);
            color: var(--text-primary);
            font-family: 'minecraft', 'Courier New', monospace;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
            position: relative;
            min-height: 100vh;
            padding: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 30, 30, 0.02) 2px, rgba(255, 30, 30, 0.02) 4px);
            pointer-events: none; z-index: 999; opacity: 0.6;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(255, 50, 50, 0.03) 50%, transparent 100%);
            pointer-events: none; z-index: 998;
            animation: scanline 6s linear infinite; opacity: 0.7;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; overflow: hidden;
        }

        .particle {
            position: absolute; width: 2px; height: 2px;
            background: var(--bright-red); border-radius: 50%;
            opacity: 0; box-shadow: 0 0 8px var(--glow-red);
            animation: particleFloat 15s infinite ease-in-out;
        }

        @keyframes particleFloat {
            0%, 100% { opacity: 0; transform: translateY(100vh) scale(0.5); }
            10%, 90% { opacity: 0.6; }
            50% { opacity: 1; transform: translateY(50vh) scale(1); }
        }

        .container {
            width: 100%; padding: 1.5rem; max-width: 1200px;
            margin: 0 auto; position: relative; z-index: 10;
        }

        /* Glass Header */
        header {
            background: linear-gradient(135deg, rgba(15,15,25,0.85) 0%, rgba(25,15,20,0.75) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem 0; text-align: center;
            position: relative; overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: headerPulse 20s infinite alternate;
            margin-bottom: 2rem;
        }

        @keyframes headerPulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 40px rgba(255,30,30,0.15); }
            50% { box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 80px rgba(255,50,50,0.3); }
        }

        .header-glow {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, transparent 20%, rgba(255,50,50,0.15) 50%, transparent 80%);
            pointer-events: none; animation: rotateGlow 45s infinite linear; opacity: 0.8;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            to { transform: rotate(360deg) scale(1); }
        }

        .logo-container { margin-bottom: 1rem; position: relative; display: inline-block; }

        .epsilon-logo {
            width: 160px; height: auto;
            filter: drop-shadow(0 0 15px var(--glow-red));
            animation: pulse 3s infinite alternate, float 8s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .epsilon-logo:hover {
            transform: scale(1.12) rotate(3deg);
            filter: drop-shadow(0 0 30px var(--bright-red));
        }

        @keyframes pulse {
            from { filter: drop-shadow(0 0 10px var(--primary-red)); opacity: 0.95; }
            to { filter: drop-shadow(0 0 35px var(--bright-red)); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1deg); }
        }

        h1 {
            font-size: 2.8rem; color: var(--bright-red);
            text-shadow: 0 0 10px var(--primary-red), 0 0 25px var(--glow-red), 0 0 50px rgba(255,50,50,0.4);
            margin-bottom: 0.5rem; letter-spacing: 2px;
            animation: glitch 6s infinite, textGlow 4s infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 10px var(--primary-red), 0 0 25px var(--glow-red); }
            to { text-shadow: 0 0 15px var(--bright-red), 0 0 40px var(--glow-red), 0 0 70px rgba(255,80,80,0.5); }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px var(--primary-red), 0 0 25px var(--glow-red); }
            20% { text-shadow: 3px 0 15px var(--bright-red), -3px 0 15px var(--dark-red), 0 0 25px var(--glow-red); }
            40% { text-shadow: 0 0 10px var(--primary-red), 0 0 25px var(--glow-red); }
            60% { text-shadow: -3px 0 15px var(--primary-red), 3px 0 15px var(--dark-red), 0 0 25px var(--glow-red); }
            80% { text-shadow: 0 0 10px var(--primary-red), 0 0 25px var(--glow-red); }
        }

        .subtitle {
            font-size: 1rem; color: var(--bright-red);
            font-weight: bold; letter-spacing: 4px;
            text-transform: uppercase; text-shadow: 0 0 10px rgba(255,50,50,0.5);
            opacity: 0.9; margin-bottom: 1rem;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--text-secondary); text-decoration: none;
            font-weight: 600; font-size: 0.95rem;
            padding: 0.5rem 1rem; border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--bright-red);
            background: rgba(255,40,40,0.15);
            border-color: var(--bright-red);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,40,40,0.25);
            text-shadow: 0 0 12px rgba(255,50,50,0.6);
        }

        /* Glass navigation */
        nav {
            background: linear-gradient(135deg, rgba(15,15,25,0.92) 0%, rgba(25,15,25,0.88) 100%);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 0.8rem 0; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px var(--glass-border), inset 0 1px 0 var(--glass-highlight);
            border-bottom: 1px solid var(--glass-border);
        }

        .burger-menu {
            display: none; flex-direction: column; cursor: pointer;
            padding: 0.5rem; z-index: 101;
        }

        .burger-line {
            width: 25px; height: 3px;
            background: linear-gradient(90deg, var(--bright-red), white);
            margin: 3px 0; border-radius: 2px;
            transition: all 0.3s ease; box-shadow: 0 0 8px var(--glow-red);
        }

        nav ul {
            display: flex; justify-content: center; list-style: none;
            flex-wrap: wrap; gap: 0.4rem; margin: 0; padding: 0;
        }

        nav li { margin: 0; }

        nav a {
            color: var(--text-secondary); text-decoration: none;
            padding: 0.5rem 1rem; border-radius: 8px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600; text-transform: uppercase;
            font-size: 0.85rem; letter-spacing: 1.2px;
            position: relative; background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
        }

        nav a::before {
            content: ''; position: absolute; inset: 0; border-radius: 8px;
            padding: 1px;
            background: linear-gradient(45deg, transparent, var(--glow-red), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            opacity: 0; transition: opacity 0.3s ease;
        }

        nav a:hover::before, nav a.active::before { opacity: 1; }

        nav a:hover, nav a.active {
            color: var(--bright-red); background: rgba(255,30,30,0.15);
            border-color: var(--glass-border); transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,30,30,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
            text-shadow: 0 0 12px rgba(255,50,50,0.6);
        }

        nav a.active { background: rgba(255,40,40,0.22); border-color: var(--bright-red); }

        main { padding: 1rem 0 2.5rem; position: relative; z-index: 10; }

        /* Glass sections */
        .page-section {
            margin-bottom: 2.5rem; padding: 1.8rem;
            background: var(--glass-bg); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--bright-red);
            border-radius: 16px;
            transition: all 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(25px);
            animation: fadeInUp 1s forwards;
            box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 var(--glass-highlight), 0 0 0 1px rgba(255,255,255,0.02);
            position: relative; overflow: hidden;
        }

        .page-section::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
            opacity: 0.6;
        }

        .page-section.appear { opacity: 1; transform: translateY(0); }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .page-section:hover {
            transform: translateX(8px) translateY(-3px) !important;
            box-shadow: 0 12px 45px rgba(0,0,0,0.45), 0 0 25px rgba(255,40,40,0.25), inset 0 1px 0 var(--glass-highlight);
            border-color: var(--bright-red); background: rgba(25,25,35,0.75);
        }

        h2 {
            color: var(--bright-red); font-size: 2rem;
            margin-bottom: 1.2rem; text-shadow: 0 0 8px var(--primary-red), 0 0 20px var(--glow-red);
            position: relative; letter-spacing: 0.5px;
        }

        h2::after {
            content: ''; position: absolute; bottom: -10px; left: 0;
            width: 50px; height: 3px;
            background: linear-gradient(90deg, var(--bright-red), transparent);
            border-radius: 2px; animation: growLine 1.2s ease forwards;
            box-shadow: 0 0 12px var(--glow-red);
        }

        @keyframes growLine { from { width: 0; opacity: 0.5; } to { width: 50px; opacity: 1; } }

        /* Glass author cards */
        .authors-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem; max-width: 1200px; margin: 1.5rem auto 0;
        }

        .author {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; cursor: pointer;
            background: linear-gradient(145deg, rgba(30,30,45,0.7), rgba(20,20,35,0.6));
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 1.6rem 1.2rem;
            transition: all 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
            box-shadow: 0 6px 25px rgba(0,0,0,0.3), inset 0 1px 0 var(--glass-highlight);
            opacity: 0; transform: translateY(20px);
            animation: fadeInUp 1s forwards;
        }

        .author:nth-child(1) { animation-delay: 0.1s; }
        .author:nth-child(2) { animation-delay: 0.2s; }
        .author:nth-child(3) { animation-delay: 0.3s; }
        .author:nth-child(4) { animation-delay: 0.4s; }

        .author::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            transition: left 0.6s ease; pointer-events: none;
        }

        .author:hover::before { left: 100%; }

        .author:hover {
            transform: translateY(-8px) scale(1.02) !important;
            box-shadow: 0 12px 40px rgba(255,40,40,0.35), 0 0 0 1px var(--bright-red), inset 0 1px 0 var(--glass-highlight);
            border-color: var(--bright-red);
            background: linear-gradient(145deg, rgba(35,35,50,0.8), rgba(25,25,40,0.7));
        }

        .author::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--dark-red), var(--bright-red), var(--dark-red));
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.5s ease;
        }

        .author:hover::after { transform: scaleX(1); }

        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--glass-border);
            box-shadow: 0 0 20px var(--glow-red);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,30,30,0.1); padding: 3px;
        }

        .author:hover .avatar {
            transform: scale(1.1) rotate(2deg);
            border-color: var(--bright-red);
            box-shadow: 0 0 35px var(--bright-red);
        }

        .name {
            margin-top: 1rem; font-size: 1.25rem; font-weight: 700;
            color: var(--bright-red); text-shadow: 0 0 10px rgba(255,50,50,0.4);
            letter-spacing: 0.5px; word-break: break-word;
        }

        .role {
            margin-top: 0.3rem; font-size: 0.9rem;
            color: var(--text-dim); opacity: 0.85;
        }

        /* Glass Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 5, 12, 0.92);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 1000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.35s ease;
        }

        .modal.active { display: flex; opacity: 1; }

        .modal-content {
            background: linear-gradient(145deg, rgba(25,25,40,0.95), rgba(15,15,30,0.9));
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border); border-radius: 20px;
            width: 95%; max-width: 650px; max-height: 90vh;
            overflow: hidden; position: relative;
            box-shadow: 0 0 40px rgba(255,40,40,0.4), inset 0 1px 0 var(--glass-highlight);
            display: flex; flex-direction: column;
            animation: modalSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-scrollable {
            padding: 2rem; overflow-y: auto; flex: 1;
            -webkit-overflow-scrolling: touch;
        }

        .modal-scrollable::-webkit-scrollbar { width: 6px; }
        .modal-scrollable::-webkit-scrollbar-track { background: rgba(20,20,30,0.3); border-radius: 3px; }
        .modal-scrollable::-webkit-scrollbar-thumb { background: var(--bright-red); border-radius: 3px; }

        .close-btn {
            position: absolute; top: 1.2rem; right: 1.2rem;
            color: var(--bright-red); font-size: 2rem; cursor: pointer;
            background: rgba(255,30,30,0.15); border: 1px solid var(--glass-border);
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; font-weight: bold; z-index: 10;
        }

        .close-btn:hover {
            background: rgba(255,40,40,0.3); border-color: var(--bright-red);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 20px rgba(255,50,50,0.4);
        }

        .modal-avatar {
            width: 130px; height: 130px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--glass-border);
            margin: 0 auto 1.4rem; display: block;
            box-shadow: 0 0 25px var(--glow-red);
            background: rgba(255,30,30,0.1); padding: 4px;
            transition: all 0.4s ease;
        }

        .modal-avatar:hover {
            transform: scale(1.05) rotate(3deg);
            border-color: var(--bright-red);
            box-shadow: 0 0 40px var(--bright-red);
        }

        .modal-title {
            font-size: 1.8rem; color: var(--bright-red);
            text-align: center; margin-bottom: 1rem;
            text-shadow: 0 0 15px rgba(255,50,50,0.5);
            letter-spacing: 1px;
        }

        .modal-desc {
            color: var(--text-secondary); line-height: 1.7;
            font-size: 1.05rem; text-align: left;
            word-wrap: break-word; white-space: pre-line;
            margin-bottom: 1.5rem; opacity: 0.95;
        }

        .modal-desc strong { color: var(--bright-red); }

        .social-links {
            display: flex; justify-content: center; gap: 1rem; margin-top: 1.2rem; flex-wrap: wrap;
        }

        .social-btn {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-border);
            position: relative; overflow: hidden;
        }

        .social-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            opacity: 0; transition: opacity 0.3s ease;
        }

        .social-btn:hover::before { opacity: 1; }

        .social-btn.telegram { background: linear-gradient(135deg, rgba(0,136,204,0.3), rgba(0,100,150,0.2)); }
        .social-btn.youtube { background: linear-gradient(135deg, rgba(255,0,0,0.3), rgba(200,0,0,0.2)); }
        .social-btn.boosty { background: linear-gradient(135deg, rgba(110,73,255,0.3), rgba(80,50,200,0.2)); }

        .social-btn:hover {
            transform: scale(1.12) translateY(-3px);
            border-color: var(--bright-red);
            box-shadow: 0 8px 25px rgba(255,40,40,0.3);
        }

        .social-icon { width: 26px; height: 26px; fill: white; }

        /* Glass footer */
        footer {
            background: linear-gradient(180deg, rgba(15,15,25,0.95) 0%, rgba(10,10,18,0.98) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 2rem 0; text-align: center;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-highlight);
            margin-top: 2rem;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3), inset 0 1px 0 var(--glass-highlight);
            position: relative; z-index: 10;
        }

        .footer-content {
            display: flex; flex-direction: column; align-items: center; gap: 1rem;
        }

        .footer-links {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 0.6rem; margin: 0.3rem 0; align-items: center;
        }

        .footer-link {
            color: var(--text-secondary); font-size: 0.92rem;
            text-decoration: none; transition: all 0.3s ease;
            padding: 0.3rem 0.6rem; border-radius: 6px;
        }

        .footer-link:hover {
            color: var(--bright-red); background: rgba(255,40,40,0.15);
            text-shadow: 0 0 10px rgba(255,50,50,0.5);
            transform: translateY(-1px);
        }

        .social-links-footer {
            display: flex; gap: 1.4rem; margin: 0.8rem 0;
        }

        .social-link-footer {
            color: var(--text-primary); font-size: 1.4rem;
            text-decoration: none; transition: all 0.35s ease;
            padding: 0.5rem; border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid transparent;
        }

        .social-link-footer:hover {
            color: var(--bright-red); transform: scale(1.15) translateY(-3px);
            background: rgba(255,40,40,0.2);
            border-color: var(--glass-border);
            box-shadow: 0 6px 25px rgba(255,40,40,0.3);
            text-shadow: 0 0 15px var(--glow-red);
        }

        .copyright { color: var(--text-dim); font-size: 0.88rem; opacity: 0.8; }

        /* Fireflies */
        .firefly {
            position: fixed; top: 0; left: 0; width: 4px; height: 4px;
            background: var(--bright-red); border-radius: 50%;
            opacity: 0; pointer-events: none;
            box-shadow: 0 0 8px 2px var(--glow-red), 0 0 20px 4px rgba(255,50,50,0.3);
            animation: floatUp linear infinite; z-index: 2;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; transform: translateY(90vh) translateX(10px) scale(1); }
            50% { opacity: 0.5; transform: translateY(50vh) translateX(-5px) scale(0.8); }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) translateX(0) scale(0.3); opacity: 0; }
        }

        @media (max-width: 480px) { .firefly { display: none; } }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .epsilon-logo { width: 140px; }
            .container { padding: 1rem; }
            main { padding: 0.5rem 0 2rem; }

        // Burger menu
        const burger = document.getElementById('burgerMenu');
        const navList = document.getElementById('navList');

                burger.classList.toggle('active');
                navList.classList.toggle('active');
            });
            document.querySelectorAll('#navList a').forEach(link => {
                link.addEventListener('click', () => {
                    burger.classList.remove('active');
                    navList.classList.remove('active');
                });
            });
        }

        // Particles
        function createParticles() {
            if (window.innerWidth <= 480) return;
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = `${Math.random()*100}vw`;
                p.style.animationDuration = `${12+Math.random()*18}s`;
                p.style.animationDelay = `${Math.random()*10}s`;
                p.style.opacity = `${0.3+Math.random()*0.5}`;
                p.style.width = p.style.height = `${1+Math.random()*3}px`;
                container.appendChild(p);
            }
        }

        // Fireflies
        function createFireflies() {
            if (window.innerWidth <= 480) return;
            for (let i = 0; i < 25; i++) {
                const f = document.createElement('div');
                f.classList.add('firefly');
                f.style.left = `${Math.random()*100}vw`;
                f.style.animationDuration = `${8+Math.random()*12}s`;
                f.style.animationDelay = `${Math.random()*6}s`;
                document.body.appendChild(f);
            }
        }

        // Scroll animations
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('appear'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.page-section').forEach(s => observer.observe(s));

        // Modal logic
        const icons = {
            telegram: `<svg class="social-icon" viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.3 8.7l-2.1 8.4c-.2.8-.6 1-1.3.7L9.8 15l-4.3-.4c-.8-.1-.8-.7 0-.9l10.4-7.3c.6-.4 1.2-.1 1.4.4z"/></svg>`,
            youtube: `<svg class="social-icon" viewBox="0 0 24 24"><path d="M19.6 6.3c-1.3-2.4-3.4-2.8-6.4-2.8S7.1 4 5.8 6.3C4 9.2 4 12 4 12s0 2.8 1.8 5.7c1.3 2.4 3.4 2.8 6.4 2.8s5.1-.4 6.4-2.8c1.8-2.9 1.8-5.7 1.8-5.7s0-2.8-1.8-5.7zM10 15.8l5.5-3-5.5-3v6z"/></svg>`,
            boosty: `<svg class="social-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1 14.5V7.5l5.5 4.5-5.5 4.5z"/></svg>`
        };

        document.querySelectorAll('.author').forEach(author => {
            author.addEventListener('click', () => {
                document.getElementById('modalTitle').textContent = author.dataset.name;
                document.getElementById('modalDesc').innerHTML = author.dataset.desc;
                document.getElementById('modalAvatar').src = author.dataset.img;
                const socials = document.getElementById('modalSocials');
                socials.innerHTML = '';
                if (author.dataset.telegram) {
                    const btn = document.createElement('a');
                    btn.href = author.dataset.telegram; btn.target = "_blank"; btn.rel = "noopener";
                    btn.className = "social-btn telegram"; btn.title = "Telegram";
                    btn.innerHTML = icons.telegram; socials.appendChild(btn);
                }
                document.getElementById('authorModal').classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });

        function closeModal() {
            document.getElementById('authorModal').classList.remove('active');
            document.body.style.overflow = '';

        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('authorModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // Init
        document.addEventListener('DOMContentLoaded', () => {

        // Security

            document.addEventListener('contextmenu', e => e.preventDefault());

            });

<script>
    function toggleTgWidget() {
        const card = document.getElementById('tgCard');
        const toggle = document.getElementById('tgToggle');
        
        if (card.classList.contains('active')) {
            card.classList.remove('active');
            toggle.classList.remove('open');
            setTimeout(() => {
                if (!card.classList.contains('active')) card.style.display = 'none';
            }, 400);
        } else {
            card.style.display = 'block';
            setTimeout(() => {
                card.classList.add('active');
                toggle.classList.add('open');
            }, 10);
        }
    }

    document.addEventListener('click', (e) => {
        const widget = document.querySelector('.tg-widget-container');
        const card = document.getElementById('tgCard');
        const toggle = document.getElementById('tgToggle');
        
        if (!widget.contains(e.target) && card.classList.contains('active')) {
            toggleTgWidget();
        }
    });
</script>
