<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Epsilon</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">ε</div>
        <h1>Epsilon</h1>
      </a>
      
      <div class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
      
      <nav>
        <ul id="nav-menu">
          <li><a href="index.html">Главная</a></li>
          <li><a href="register.html">Регистрация</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card" style="max-width: 500px; margin: 50px auto;">
      <h2 class="text-center">🔐 Вход в аккаунт</h2>
      <p style="color: var(--gray); text-align: center; margin-bottom: 30px;">
        Введите свои данные для доступа к системе
      </p>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">📧 Email</label>
          <input type="email" id="email" placeholder="agent@epsilon.org" required>
        </div>
        
        <div class="form-group">
          <label for="password">🔑 Пароль</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6">
        </div>
        
        <button type="submit" class="btn btn-block mt-2">
          <span>🚀</span> Войти в систему
        </button>
        
        <p class="text-center mt-2">
          Нет аккаунта? 
          <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">
            Зарегистрироваться
          </a>
        </p>
      </form>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2024 Фонд «Эпсилон». Все права защищены.</p>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="assets/js/firebase.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;"></span> Вход...';

      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        window.location.href = 'index.html';
      } catch (error) {
        alert('Ошибка входа: ' + error.message);
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>🚀</span> Войти в систему';
      }
    });

    // Мобильное меню
    document.addEventListener('DOMContentLoaded', () => {
      const menuToggle = document.getElementById('menu-toggle');
      const navMenu = document.getElementById('nav-menu');
      
      if (menuToggle && navMenu) {
        menuToggle.addEventListener('click', () => {
          navMenu.classList.toggle('active');
        });
      }
    });
  </script>
</body>
</html>
