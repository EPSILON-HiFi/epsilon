<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epsilon | Official WebSite</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="epsilon-logo.png" type="image/png">
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">
        <img src="epsilon-logo.png" alt="Epsilon">
        <h1>Epsilon</h1>
      </div>
    </div>
  </header>

  <div class="container">
    <nav>
      <ul id="nav-menu">
        <!-- Динамически заполняется через JS -->
      </ul>
    </nav>

    <section class="card">
      <h2>Добро пожаловать в фонд «Эпсилон»</h2>
      <p>Закрытая международная организация, специализирующаяся на выявлении и нейтрализации аномальных угроз.</p>
      
      <div id="auth-buttons" style="margin-top: 20px;">
        <button class="btn" onclick="location.href='login.html'">Войти</button>
        <button class="btn btn-outline" onclick="location.href='register.html'">Регистрация</button>
      </div>
      
      <div id="user-info" style="display: none; margin-top: 20px;">
        <p>Привет, <span id="user-name"></span>!</p>
        <button class="btn" onclick="location.href='profile.html'">Мой профиль</button>
        <button class="btn btn-outline" onclick="logout()">Выйти</button>
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="assets/js/firebase.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
